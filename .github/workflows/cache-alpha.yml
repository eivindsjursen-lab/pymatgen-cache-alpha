name: cache-alpha

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -leo pipefail {0}
    env:
      OPT_BIN_DIR: ${{ github.workspace }}/opt/bin

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Create mamba environment
        uses: mamba-org/setup-micromamba@main
        with:
          environment-name: pmg
          cache-environment: true
          create-args: >-
            python=3.13

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build wheel and install minimal package
        run: |
          uv build --wheel --no-build-logs
          WHEEL_FILE=$(ls dist/pymatgen*.whl | head -n1)
          uv pip install "$WHEEL_FILE"

      - name: Build opt-bin cache key string
        id: optbin_key
        run: |
          KEY_STR="opt-bin|${{ runner.os }}|$(sha256sum .github/workflows/_install_opt_unit_deps.sh | cut -d ' ' -f1)"
          echo "key_str=$KEY_STR" >> "$GITHUB_OUTPUT"

      - name: Compute opt-bin key fingerprint
        id: optbin_fp
        env:
          KEY_STR: ${{ steps.optbin_key.outputs.key_str }}
        run: |
          KEY_FP=$(printf '%s' "$KEY_STR" | sha256sum | cut -c1-12)
          echo "key_fp=$KEY_FP" >> "$GITHUB_OUTPUT"

      - name: "[cache-step] group=opt-bin"
        id: optbin_cache
        uses: actions/cache@v5
        with:
          path: ${{ env.OPT_BIN_DIR }}
          key: ${{ steps.optbin_key.outputs.key_str }}
          restore-keys: |
            opt-bin|${{ runner.os }}|

      - name: "[cache] group=opt-bin hit=${{ steps.optbin_cache.outputs.cache-hit || 'false' }} key_fp=${{ steps.optbin_fp.outputs.key_fp }} key_hint=opt-bin"
        run: echo "opt-bin cache marker emitted"

      - name: Build optional dependencies on cache miss
        if: steps.optbin_cache.outputs.cache-hit != 'true'
        run: bash .github/workflows/_install_opt_unit_deps.sh "$OPT_BIN_DIR"

      - name: Smoke test import
        run: python -c "import pymatgen; print(getattr(pymatgen, '__version__', 'ok'))"

  cache-gate:
    runs-on: ubuntu-latest
    needs: [build-test]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v5

      - name: Run Cache Health Gate
        id: gate
        uses: eivindsjursen-lab/gates-suite-public-beta/packages/cache-health-gate@cache-health-gate/v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: warn
          no_baseline_behavior: warn
          baseline_runs: "8"
          baseline_window_days: "14"
          baseline_event_filter: push
          debug: "true"

      - name: Print outputs
        shell: bash
        run: |
          echo "RESULT=${{ steps.gate.outputs.result }}"
          echo "CONFIDENCE=${{ steps.gate.outputs.confidence }}"
          echo "BASELINE_SAMPLES=${{ steps.gate.outputs.baseline_samples }}"
          echo "REASON_CODES=${{ steps.gate.outputs.reason_codes }}"
